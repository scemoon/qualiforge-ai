name: Deploy to CloudBase

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/web/package-lock.json

      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli

      # ── Build Web App ────────────────────────────────────────────────
      - name: Build web app
        run: |
          cd src/web
          npm ci
          npm run build
        env:
          CI: true

      # ── Deploy Static Hosting ─────────────────────────────────────────
      - name: Deploy static to CloudBase
        run: |
          # Prepare stub directories for SPA routing
          mkdir -p dist/admin/dashboard dist/admin/users dist/admin/articles \
                 dist/admin/articles/review dist/admin/tags dist/admin/sections \
                 dist/admin/evaluations dist/admin/skills \
                 dist/my/edit dist/my/article/new dist/my/collection \
                 dist/my/notifications dist/profile dist/article/search

          cp dist/web/index.html dist/index.html
          for path in admin/index.html admin/dashboard/index.html admin/users/index.html \
                      admin/articles/index.html admin/articles/review/index.html \
                      admin/tags/index.html admin/sections/index.html \
                      admin/evaluations/index.html admin/skills/index.html \
                      my/index.html my/edit/index.html my/article/new/index.html \
                      my/collection/index.html my/notifications/index.html \
                      profile/index.html article/search/index.html; do
            cp dist/web/index.html dist/$path
          done

          tcb hosting deploy dist --env-id ${{ vars.CLOUDBASE_ENV_ID }}
        env:
          TCB_APP_ID: ${{ secrets.CLOUDBASE_APP_ID }}
          TCB_APP_SECRET: ${{ secrets.CLOUDBASE_APP_SECRET }}
          TCB_ENV_ID: ${{ vars.CLOUDBASE_ENV_ID }}

      # ── Deploy Cloud Functions ───────────────────────────────────────
      - name: Deploy cloud functions
        run: |
          cd cloud
          # Deploy each function that changed
          for func in auth article-crud skill-crud evaluation-crud \
                      section-crud notification-crud search file-upload wechat-sync; do
            echo "Deploying $func..."
            tcb fn deploy $func --env-id ${{ vars.CLOUDBASE_ENV_ID }} --force 2>&1 | tail -3
          done
        env:
          TCB_APP_ID: ${{ secrets.CLOUDBASE_APP_ID }}
          TCB_APP_SECRET: ${{ secrets.CLOUDBASE_APP_SECRET }}
          TCB_ENV_ID: ${{ vars.CLOUDBASE_ENV_ID }}
