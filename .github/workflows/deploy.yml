name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/web/package-lock.json
      - run: |
          cd src/web
          npm ci
          npm run build
      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli
      - name: Deploy to CloudBase CDN
        run: tcb hosting deploy dist/web / --force --env-id ${{ secrets.CLOUDBASE_ENV_ID }}
      - name: Deploy Cloud Functions
        run: |
          cd cloud
          for fn in auth article-crud skill-crud evaluation-crud section-crud notification-crud user-crud search file-upload wechat-sync data-seeder section-reset; do
            tcb fn deploy "$fn" --env-id ${{ secrets.CLOUDBASE_ENV_ID }} --force
          done
