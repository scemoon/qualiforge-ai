name: Deploy
on:
  push:
    branches: [main]
permissions:
  contents: read
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: cd src/web && npm ci && npm run build
      - uses: cloudbase/actions/cloudbase-action@v1
        with:
          env-id: \${{ secrets.CLOUDBASE_ENV_ID }}
          args: hosting deploy dist/web / --force
