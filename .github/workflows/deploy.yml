name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/web/package-lock.json
      - run: cd src/web && npm ci && npm run build
      - name: Deploy to CloudBase CDN
        run: npx tcb hosting deploy dist/web / --force --env-id ${{ secrets.CLOUDBASE_ENV_ID }}
