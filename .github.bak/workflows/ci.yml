name: CI Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/web/package-lock.json

      - name: Install dependencies
        run: |
          cd src/web
          npm ci

      - name: TypeScript check
        run: |
          cd src/web
          npx tsc --noEmit

  cloud-function-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: List changed cloud functions
        run: |
          echo "Changed files:"
          git diff --name-only origin/main...HEAD | grep "cloud/functions/" | head -20 || echo "No function changes"
